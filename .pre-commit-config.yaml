repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.6
    hooks:
      - id: clang-format
        args: [ '--style=file' ]
        # clang-format treats notebooks as JSON and splits long lines into adjacent
        # string literals, which is invalid JSON
        exclude: '\.ipynb$'
  - repo: local
    hooks:
      # Checks links in Markdown files, resolving documentation links against the dev
      # deployment (branches/dev/) when not on master (see tools/linkcheck_markdown.py)
      - id: linkcheck-markdown
        name: linkcheck-markdown
        entry: python tools/linkcheck_markdown.py
        language: python
        # A single invocation dedupes URLs and throttles requests per host; parallel
        # invocations would defeat that and provoke HTTP 429 from github.com
        require_serial: true
        types: [ markdown ]

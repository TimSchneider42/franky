<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>franky</title>
<script>
// The documentation used to live at the site root but has moved to master/, so old
// deep links (e.g. /franky/guide/foo.html) are redirected to master/ here
(function () {
  var parts = window.location.pathname.split("/");
  // parts[1] is the repository name, parts[2] the first path segment within the site
  if (parts.length > 2 && ["master", "dev", "whl"].indexOf(parts[2]) === -1) {
    parts.splice(2, 0, "master");
    window.location.replace(
      parts.join("/") + window.location.search + window.location.hash
    );
  }
})();
</script>
</head>
<body>
<p>Page not found. Head to the <a href="/franky/master/">franky documentation</a>.</p>
</body>
</html>

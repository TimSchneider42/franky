name: Build wheels

on:
  workflow_call:
    inputs:
      libfranka-version:
        required: true
        type: string
      manylinux-version:
        required: true
        type: string

jobs:
  build_wheels:
    runs-on: ubuntu-latest

    container:
      image: quay.io/pypa/${{ inputs.manylinux-version }}

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          libfranka-version: ${{ inputs.libfranka-version }}
          manylinux-version: ${{ inputs.manylinux-version }}

      - name: Setting up pip
        run: |
          ./docker/common/manylinux-setup-pip

      - name: Python package
        run: |
          LIBFRANKA_VERSION=${{ inputs.libfranka-version }} ./docker/common/manylinux-build-wheels

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels___${{ inputs.libfranka-version }}___${{ inputs.manylinux-version }}
          path: output/libfranka_*_wheels.zip

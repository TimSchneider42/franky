name: Build wheels

on:
  workflow_call:
    inputs:
      libfranka-version:
        required: true
        type: string
      manylinux-version:
        required: true
        type: string
      dev-build-number:
        description: Optional dev build number N, producing version <VERSION>.devN
        required: false
        type: string
        default: ""
      dev-commit-hash:
        description: Optional short commit hash appended to dev versions as +g<hash>
        required: false
        type: string
        default: ""
      libfranka-version-label:
        description: >
          If set, the wheels get a `+libfranka.<version>` local version label. Leave
          empty for wheels published to PyPI, as PyPI rejects local version labels.
        required: false
        type: string
        default: ""
      python-versions:
        description: >
          Space-separated list of Python builds to build wheels for (e.g.
          "cp312-cp312"). Leave empty to build for all supported versions.
        required: false
        type: string
        default: ""

jobs:
  ensure-container:
    uses: ./.github/workflows/ensure_build_container.yml
    with:
      libfranka-version: ${{ inputs.libfranka-version }}
      manylinux-version: ${{ inputs.manylinux-version }}

  build_wheels:
    needs: ensure-container
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-container.outputs.image }}
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build wheels
        run: ./docker/common/manylinux-build-wheels
        env:
          FRANKY_DEV_BUILD_NUMBER: ${{ inputs.dev-build-number }}
          FRANKY_DEV_BUILD_HASH: ${{ inputs.dev-commit-hash }}
          FRANKY_LIBFRANKA_VERSION_LABEL: ${{ inputs.libfranka-version-label }}
          PYBIN_VERSIONS: ${{ inputs.python-versions }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          # ___labeled avoids a collision with the unlabeled PyPI build of the same version
          name: wheels___${{ inputs.libfranka-version }}___${{ inputs.manylinux-version }}${{ inputs.libfranka-version-label != '' && '___labeled' || '' }}
          path: dist/*.whl

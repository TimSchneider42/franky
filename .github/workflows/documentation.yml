name: Documentation

on:
  push:
    branches:
    - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Serialize all deployments to gh-pages (shared with the package index workflow)
    # to avoid push races
    concurrency: gh-pages-deploy
    steps:
    - uses: actions/checkout@v6

    - name: dependencies
      env:
        dependency_packages: doxygen
      run: sudo apt-get update && sudo apt-get -y install ${dependency_packages}

    - name: build
      run: cd doc && VERSION=$(cat ../VERSION) doxygen ./Doxyfile

    # The deployment below replaces the entire gh-pages root, so it must include the
    # package index
    - name: generate package index
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python3 tools/generate_simple_index.py --output doc/html/whl

    - name: deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./doc/html

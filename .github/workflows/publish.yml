name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  get-versions:
    uses: ./.github/workflows/get_libfranka_versions.yml

  build:
    needs: get-versions
    strategy:
      matrix:
        libfranka-version: ${{ fromJson(needs.get-versions.outputs.versions) }}
        manylinux-version: [manylinux_2_28_x86_64, manylinux_2_34_x86_64]
    uses: ./.github/workflows/build_wheels.yml
    with:
      libfranka-version: ${{ matrix.libfranka-version }}
      manylinux-version: ${{ matrix.manylinux-version }}

  publish:
    needs: [build, get-versions]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels___*
          path: artifacts/

      - name: Merge wheels
        uses: ./.github/actions/merge-wheels

      - name: Create release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          draft: false
          files: |
            output/libfranka_*_wheels.zip

      - name: Unpack wheels
        run: |
          version="${{ needs.get-versions.outputs.latest }}"
          unzip "output/libfranka_${version//./-}_wheels.zip"

      - name: Publish python package
        uses: pypa/gh-action-pypi-publish@release/v1

name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  get-versions:
    uses: ./.github/workflows/get_libfranka_versions.yml

  build:
    needs: get-versions
    strategy:
      matrix:
        libfranka-version: ${{ fromJson(needs.get-versions.outputs.versions) }}
        manylinux-version: [manylinux_2_28_x86_64, manylinux_2_34_x86_64]
    uses: ./.github/workflows/build_wheels.yml
    with:
      libfranka-version: ${{ matrix.libfranka-version }}
      manylinux-version: ${{ matrix.manylinux-version }}
      libfranka-version-label: ${{ matrix.libfranka-version }}

  # Separate unlabeled build of the latest libfranka version for PyPI, which rejects
  # local version labels
  build-pypi:
    needs: get-versions
    strategy:
      matrix:
        manylinux-version: [manylinux_2_28_x86_64, manylinux_2_34_x86_64]
    uses: ./.github/workflows/build_wheels.yml
    with:
      libfranka-version: ${{ needs.get-versions.outputs.latest }}
      manylinux-version: ${{ matrix.manylinux-version }}

  publish:
    needs: [build, build-pypi]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels___*
          path: wheels/
          merge-multiple: true

      - name: Create release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          draft: false
          files: |
            wheels/*.whl

      - name: Collect PyPI wheels
        run: |
          # Only the unlabeled wheels (no `+` in the filename) go to PyPI
          mkdir -p dist
          find wheels -name '*.whl' ! -name '*+*' -exec cp {} dist/ \;
          ls dist/*.whl

      - name: Publish python package
        uses: pypa/gh-action-pypi-publish@release/v1

  update-package-index:
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/simple_index.yml

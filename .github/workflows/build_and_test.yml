name: Build and test

on:
  workflow_call:
    inputs:
      libfranka-version:
        required: true
        type: string

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential cmake git python3-dev libboost-all-dev liburdfdom-dev libfmt-dev libssl-dev libmysqlclient-dev libpq-dev

      - name: Cache build dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: deps-ubuntu-${{ hashFiles('docker/common/install-*', 'docker/common/dependency_versions') }}-${{ inputs.libfranka-version }}

      - name: Install other dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          LIBFRANKA_VERSION=${{ inputs.libfranka-version }} ./docker/common/install-dependencies

      - name: Refresh linker cache
        run: sudo ldconfig

      - name: Configure & make
        run: |
          mkdir build && cd build
          cmake ..
          make -j2

#      - name: Test
#        run: make test

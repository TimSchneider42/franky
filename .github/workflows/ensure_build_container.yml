name: Ensure build container

on:
  workflow_call:
    inputs:
      libfranka-version:
        required: true
        type: string
      manylinux-version:
        required: true
        type: string
    outputs:
      image:
        description: Full Docker image reference to use as build container
        value: ${{ jobs.ensure.outputs.image }}

jobs:
  ensure:
    runs-on: ubuntu-latest
    concurrency:
      group: build-container-${{ inputs.manylinux-version }}-libfranka${{ inputs.libfranka-version }}
      cancel-in-progress: false
    permissions:
      packages: write
    outputs:
      image: ${{ steps.compute-tag.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: compute-tag
        run: |
          DOCKER_HASH=$(find docker/ -type f -exec sha256sum {} \; | sort | sha256sum | cut -c1-12)
          TAG="${{ inputs.manylinux-version }}-libfranka${{ inputs.libfranka-version }}-${DOCKER_HASH}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/franky-build:${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check-image
        run: |
          if docker manifest inspect ${{ steps.compute-tag.outputs.image }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/build/Dockerfile
          push: true
          tags: ${{ steps.compute-tag.outputs.image }}
          build-args: |
            MANYLINUX_VERSION=${{ inputs.manylinux-version }}
            LIBFRANKA_VERSION=${{ inputs.libfranka-version }}

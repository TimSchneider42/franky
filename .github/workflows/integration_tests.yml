name: Integration Tests

on: [push, pull_request]

jobs:
  get-versions:
    uses: ./.github/workflows/get_libfranka_versions.yml

  build-wheels:
    needs: get-versions
    uses: ./.github/workflows/build_wheels.yml
    with:
      libfranka-version: ${{ needs.get-versions.outputs.latest }}
      manylinux-version: manylinux_2_28_x86_64

  integration_test:
    needs: [get-versions, build-wheels]
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels___${{ needs.get-versions.outputs.latest }}___manylinux_2_28_x86_64
          path: artifacts/

      - name: Run integration tests
        run: |
          . docker/common/dependency_versions
          yum -y install -q unzip

          version="${{ needs.get-versions.outputs.latest }}"
          unzip -q "artifacts/libfranka_${version//./-}_wheels.zip" -d unpacked/

          for PYBIN in /opt/python/*/bin; do
            if [[ "${PYBIN}" =~ ${PYBIN_SUPPORTED_VERSIONS} ]]; then
              PY_VER=$("${PYBIN}/python3" -c "import sys; v=sys.version_info; print(v.major * 100 + v.minor)")
              [[ "${PY_VER}" -lt 310 ]] && continue

              PY_DIR=$(basename "$(dirname "$PYBIN")")
              echo "=== Testing ${PY_DIR} ==="

              "${PYBIN}/python3" -m venv ".venv_${PY_DIR}"
              source ".venv_${PY_DIR}/bin/activate"

              pip install -q unpacked/dist/franky_control-*-${PY_DIR}-*.whl
              pip install -q pytest pytest-cov franky-sim
              pytest tests/pytest/

              deactivate
            fi
          done

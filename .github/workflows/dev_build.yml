name: Dev build

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  get-versions:
    uses: ./.github/workflows/get_libfranka_versions.yml

  get-build-info:
    runs-on: ubuntu-latest
    outputs:
      build-number: ${{ steps.compute.outputs.build-number }}
      commit-hash: ${{ steps.compute.outputs.commit-hash }}
    steps:
      # The workflow run number is used as build number, as it increases monotonically
      # even if the history of master is rewritten
      - id: compute
        run: |
          echo "build-number=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          echo "commit-hash=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

  build:
    needs: [get-versions, get-build-info]
    strategy:
      matrix:
        libfranka-version: ${{ fromJson(needs.get-versions.outputs.versions) }}
        manylinux-version: [manylinux_2_28_x86_64, manylinux_2_34_x86_64]
    uses: ./.github/workflows/build_wheels.yml
    with:
      libfranka-version: ${{ matrix.libfranka-version }}
      manylinux-version: ${{ matrix.manylinux-version }}
      dev-build-number: ${{ needs.get-build-info.outputs.build-number }}
      dev-commit-hash: ${{ needs.get-build-info.outputs.commit-hash }}
      libfranka-version-label: ${{ matrix.libfranka-version }}

  publish:
    needs: [build, get-versions, get-build-info]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels___*
          path: wheels/
          merge-multiple: true

      - name: Update dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_REF_NAME" = master ]; then
            release_tag=dev-release
            release_title="Development (stable)"
            index_path=whl
          else
            release_tag=unstable-release
            release_title="Development (unstable)"
            index_path="branches/${GITHUB_REF_NAME}/whl"
          fi
          IFS=. read -r major minor patch < VERSION
          wheel_version="${major}.${minor}.$((patch + 1)).dev${{ needs.get-build-info.outputs.build-number }}+g${{ needs.get-build-info.outputs.commit-hash }}"
          pages_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          gh release delete "$release_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create "$release_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "$release_title" \
            --notes "Automatic build of the latest \`${GITHUB_REF_NAME}\` (${GITHUB_SHA}).

          Wheel version: \`${wheel_version}.libfranka.<libfranka version>\`, where \`<libfranka version>\` is the libfranka version the wheel was built against. Wheels are provided for all supported libfranka versions and can be installed via the [package index](${pages_url}/${index_path}/):

          \`\`\`bash
          pip install --pre franky-control --extra-index-url ${pages_url}/${index_path}/libfranka-<libfranka version>/
          \`\`\`" \
            wheels/*.whl

  update-package-index:
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/simple_index.yml
